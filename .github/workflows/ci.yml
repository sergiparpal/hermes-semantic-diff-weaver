name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.14"
          - os: windows-latest
            python: "3.11"
          - os: windows-latest
            python: "3.14"
          - os: macos-latest
            python: "3.14"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - run: python -m pip install -r requirements-dev.lock
      - run: python -m pip install . --no-deps
      - run: >-
          python -m pytest
          --cov=hermes_semantic_diff_weaver
          --cov-branch
          --cov-report=json:coverage.json
          --cov-report=term-missing
      - run: python scripts/check_coverage.py coverage.json
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy
      - run: python -m build
      - run: python scripts/verify_wheel.py dist

  hermes-compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        hermes-version: ["0.14.0", "0.18.2"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - run: python -m pip install -r requirements-dev.lock
      - run: python -m pip install "hermes-agent==${{ matrix.hermes-version }}"
      - run: python -m build
      - run: python -m pip install dist/hermes_semantic_diff_weaver-*.whl
      - run: python scripts/verify_hermes.py
