name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install . pytest pytest-cov pytest-timeout ruff build
      - run: python -m pytest --cov=hermes_semantic_diff_weaver --cov-branch
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m build
